{% extends "base.html" %}

{% block title %}Archive &mdash; {{ site_title }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Archive</h1>
  <p>All daily digests, newest first.</p>
</div>

<ul class="archive-list">
  {% for date in dates %}
  <li>
    <a href="{{ base_path }}/archive/{{ date }}.html">{{ date }}</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
