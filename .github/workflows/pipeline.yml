name: Pulse Pipeline

on:
  schedule:
    # Run daily at 7 AM Central (1 PM UTC)
    - cron: '0 13 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pulse-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout orithena-pulse
        uses: actions/checkout@v4
        with:
          path: orithena-pulse

      - name: Checkout orithena-org (unified pipeline)
        uses: actions/checkout@v4
        with:
          repository: Orithena-org/orithena-org
          path: orithena-org
          token: ${{ secrets.ORG_REPO_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orithena-pulse/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r orithena-pulse/requirements.txt
          pip install beautifulsoup4 python-dateutil

      - name: Run pipeline (scrape + build, no Discord posting)
        working-directory: orithena-org
        run: |
          python -m content.pipeline --domain pulse --no-post
          touch ../orithena-pulse/output/site/.nojekyll
        env:
          SITE_URL: https://orithena-org.github.io/orithena-pulse

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: orithena-pulse/output/site

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
