name: Pulse Pipeline

on:
  schedule:
    # Run daily at 7 AM Central (1 PM UTC)
    - cron: '0 13 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pulse-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: orithena-pulse

      - uses: actions/checkout@v4
        with:
          repository: Orithena-org/orithena-org
          path: orithena-org
          token: ${{ secrets.ORG_REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: orithena-pulse/requirements.txt

      - name: Install dependencies
        run: pip install -r orithena-pulse/requirements.txt

      - name: Run pipeline
        run: |
          cd orithena-pulse
          python run.py --domain agentic
          touch output/site/.nojekyll
        env:
          SITE_URL: https://orithena-org.github.io/orithena-pulse
          ORG_ROOT: ${{ github.workspace }}/orithena-org

      - name: Commit intel to orithena-org
        run: |
          cd orithena-org
          git config user.name "Orithena Pulse"
          git config user.email "pulse@orithena.dev"
          git add intel/pulse/
          git diff --staged --quiet || git commit -m "Pulse digest: $(date +%Y-%m-%d)"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: orithena-pulse/output/site

  deploy:
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
