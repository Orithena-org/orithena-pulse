name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'output/site/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pulse-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify site exists
        run: |
          if [ ! -f output/site/index.html ]; then
            echo "::error::No site output found at output/site/index.html"
            exit 1
          fi
          echo "Site found, deploying..."

      - name: Add .nojekyll
        run: touch output/site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
