# Domain: Agentic AI Intelligence
# Defines sources, scoring criteria, and analysis prompts for the agentic AI domain.

name: "Agentic AI"
slug: "agentic"
description: "Agent frameworks, memory systems, tool use, orchestration, multi-agent coordination"

# --- Sources ---
sources:
  hn:
    enabled: true
    adapter: "hn"
    queries:
      - "AI agent"
      - "autonomous agent"
      - "LLM agent"
      - "tool use LLM"
      - "multi-agent"
      - "agent framework"
      - "MCP server"
      - "Claude agent"
      - "agent memory"
    min_points: 5          # Minimum HN points to consider
    include_show_hn: true  # Also check Show HN posts
    max_age_hours: 24

  arxiv:
    enabled: true
    adapter: "arxiv"
    categories:
      - "cs.AI"
      - "cs.MA"
      - "cs.LG"
    search_terms:
      - "agent"
      - "tool use"
      - "multi-agent"
      - "autonomous"
      - "memory augmented"
      - "planning"
      - "reasoning"
    max_results: 100
    max_age_hours: 48      # arxiv batches, so 48h window

  github_trending:
    enabled: true
    adapter: "github_trending"
    topics:
      - "ai-agent"
      - "llm-agent"
      - "autonomous-agent"
      - "multi-agent"
      - "agent-framework"
      - "mcp"
      - "tool-use"
    languages: []          # Empty = all languages
    min_stars: 10
    max_age_hours: 48

  rss:
    enabled: true
    adapter: "rss"
    feeds:
      - name: "Simon Willison"
        url: "https://simonwillison.net/atom/everything/"
      - name: "Lilian Weng"
        url: "https://lilianweng.github.io/index.xml"
      - name: "The Batch (deeplearning.ai)"
        url: "https://www.deeplearning.ai/the-batch/feed/"
      - name: "Ahead of AI (Sebastian Raschka)"
        url: "https://magazine.sebastianraschka.com/feed"
      - name: "Latent Space"
        url: "https://www.latent.space/feed"
      - name: "AI Snake Oil"
        url: "https://www.aisnakeoil.com/feed"
      - name: "Anthropic Blog"
        url: "https://www.anthropic.com/rss.xml"
      - name: "OpenAI Blog"
        url: "https://openai.com/blog/rss.xml"
      - name: "OpenAI Engineering Blog"
        url: "https://openai.com/news/engineering/"
      - name: "Google DeepMind Blog"
        url: "https://deepmind.google/blog/rss.xml"
      - name: "Hugging Face Blog"
        url: "https://huggingface.co/blog/feed.xml"
    max_age_hours: 48

# --- Scoring ---
scoring:
  # Weight for each scoring dimension (must sum to ~1.0)
  weights:
    novelty: 0.30          # Is this new/different from what we've seen?
    relevance: 0.30        # How relevant to this domain's focus areas?
    signal_quality: 0.25   # Quality of the source, depth of content, evidence
    engagement: 0.15       # Social proof (points, stars, citations)

  # Minimum composite score to pass curation (0-10 scale)
  threshold: 3.0

  # Keywords that boost relevance score
  high_signal_keywords:
    - "agent"
    - "memory"
    - "tool use"
    - "function calling"
    - "orchestration"
    - "multi-agent"
    - "planning"
    - "reasoning"
    - "MCP"
    - "Claude"
    - "autonomous"
    - "reflection"
    - "chain of thought"
    - "retrieval augmented"

  # Keywords that indicate noise (reduce score)
  noise_keywords:
    - "hiring"
    - "salary"
    - "interview prep"
    - "course"
    - "tutorial for beginners"
    - "crypto"
    - "NFT"
    - "blockchain"

  # Source quality priors (multiplier on signal_quality)
  source_trust:
    arxiv: 1.2
    hn: 1.0
    github_trending: 1.0
    rss: 1.1              # Curated feeds tend to be higher quality

# --- Intelligence Analysis ---
analysis:
  # Focus areas for relevance scoring and report generation.
  # These are specific to what Orithena cares about.
  focus_areas:
    - area: "Memory systems"
      description: "Persistent memory, context management, RAG, memory consolidation"
      keywords: ["memory", "context window", "RAG", "retrieval", "long-term memory", "episodic"]
    - area: "Agent orchestration"
      description: "Multi-agent coordination, task decomposition, workflow"
      keywords: ["orchestration", "multi-agent", "coordination", "decomposition", "workflow"]
    - area: "Tool use & function calling"
      description: "MCP, tool use protocols, function calling, tool creation"
      keywords: ["tool use", "function calling", "MCP", "tool", "API"]
    - area: "QA & evaluation"
      description: "Agent testing, benchmarks, evaluation frameworks"
      keywords: ["benchmark", "evaluation", "testing", "quality", "safety"]
    - area: "Reasoning & planning"
      description: "Chain of thought, tree of thought, planning algorithms"
      keywords: ["reasoning", "planning", "chain of thought", "tree of thought", "reflection"]
    - area: "Deployment & productionization"
      description: "Running agents in production, sandboxing, cost management"
      keywords: ["production", "deployment", "sandbox", "budget", "cost", "scaling"]

  # Prompt template for LLM-assisted analysis (Phase 1 uses rule-based,
  # but this is here for when we enable LLM scoring)
  analysis_prompt: |
    Analyze this content item for relevance to an AI agent development organization.

    Title: {title}
    Source: {source}
    Content: {description}
    URL: {url}

    Provide:
    1. WHAT IT IS: 2-3 sentence summary of what this is and what problem it solves.
    2. NOVEL ASPECTS: What's new here vs. existing approaches? Be specific.
    3. RELEVANCE: How relevant is this to: memory systems, agent orchestration,
       tool use, QA/evaluation, reasoning/planning, or deployment?
    4. RECOMMENDED ACTION: One of: adopt, watch, ignore, investigate.
       - adopt: We should integrate this into Orithena now.
       - watch: Interesting, monitor for developments.
       - ignore: Not relevant or not mature enough.
       - investigate: Needs deeper analysis before deciding.
    5. KEY CONCEPTS: List 3-5 key technical concepts.

# --- Site ---
site:
  title: "Orithena Pulse: Agentic AI"
  tagline: "Daily intelligence on AI agents, memory, orchestration, and tool use"
  items_per_digest: 15     # Max items shown per daily digest
  show_scores: false       # Don't expose internal scoring to public
  sections:                # How to group items on the site
    - name: "Top Signal"
      description: "Highest-scoring items today"
      count: 5
    - name: "Papers"
      filter: {content_type: "paper"}
      count: 5
    - name: "Launches & Repos"
      filter: {content_type: ["repo", "launch"]}
      count: 5
    - name: "Discussion"
      filter: {content_type: ["article", "discussion"]}
      count: 5
